name: GSSOC PR Helper

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  pr-helper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Process Pull Request
        uses: actions/github-script@v9
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";
            const prNumber = context.payload.pull_request.number;
            const creator = context.payload.pull_request.user.login;

            console.log(`Processing PR #${prNumber} opened by @${creator}`);
            console.log(`PR Body excerpt: ${prBody.substring(0, 300)}...`);

            // --- STEP 1: PARSE LINKED ISSUES ---
            // Matches keywords like Closes #123, Fixes #123, Resolves #123, closes https://github.com/.../issues/123
            const regex = /(?:closes|fixes|resolves|close|fix|resolve)\s+(?:https:\/\/github\.com\/[^\/]+\/[^\/]+\/issues\/|#\s*)(\d+)/gi;
            let match;
            const linkedIssues = new Set();
            while ((match = regex.exec(prBody)) !== null) {
              linkedIssues.add(parseInt(match[1], 10));
            }

            // Fallback: search for any #123 pattern in the description if no keywords were explicitly found
            if (linkedIssues.size === 0) {
              const simpleRegex = /#\s*(\d+)/g;
              while ((match = simpleRegex.exec(prBody)) !== null) {
                linkedIssues.add(parseInt(match[1], 10));
              }
            }

            const issueNumbers = Array.from(linkedIssues);
            let issueInfo = null;
            let labelsToCopy = [];
            let levelLabel = null;

            if (issueNumbers.length > 0) {
              const issueNum = issueNumbers[0];
              console.log(`Extracted potential linked issue: #${issueNum}`);
              try {
                const issueResponse = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum
                });
                
                const issue = issueResponse.data;
                // Verify it's an issue and not another pull request
                if (issue && !issue.pull_request) {
                  console.log(`Successfully verified linked Issue #${issueNum}`);
                  issueInfo = issue;
                  
                  const issueLabels = issue.labels.map(l => l.name);
                  console.log(`Issue labels found:`, issueLabels);
                  
                  const levels = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'];
                  const standardTags = ['gssoc', 'gssoc2026'];
                  
                  for (const label of issueLabels) {
                    if (levels.includes(label)) {
                      levelLabel = label;
                      labelsToCopy.push(label);
                    }
                    if (standardTags.includes(label)) {
                      labelsToCopy.push(label);
                    }
                  }
                }
              } catch (err) {
                console.error(`Could not retrieve details for issue #${issueNum}:`, err.message);
              }
            }

            // --- STEP 2: AUTO-APPLY LABELS FROM ISSUE ---
            if (labelsToCopy.length > 0) {
              console.log(`Auto-copying labels to PR #${prNumber}:`, labelsToCopy);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: labelsToCopy
                });
              } catch (err) {
                console.error(`Failed to apply labels to PR #${prNumber}:`, err.message);
              }
            }

            // --- STEP 3: BUILD IMMERSIVE SCORING COMMENT ---
            let issueStatusMarkdown = '';
            if (issueInfo) {
              const points = {
                'level:beginner': '20 pts',
                'level:intermediate': '35 pts',
                'level:advanced': '55 pts',
                'level:critical': '80 pts'
              }[levelLabel] || '20 pts';
              
              issueStatusMarkdown = `### 🔗 Linked Issue Verified!
- **Issue**: [#${issueInfo.number}](${issueInfo.html_url}) — *${issueInfo.title}*
- **GSSOC 2026 Difficulty**: \`${levelLabel || 'level:beginner'}\` (**${points}** base difficulty points upon merge!)
- **Status**: We have automatically synced and copied the **${levelLabel || 'level:beginner'}** difficulty label to this PR!`;
            } else {
              issueStatusMarkdown = `### ⚠️ Warning: Linked Issue Missing!
We couldn't detect a valid assigned issue linked in your PR description.
To receive points for **GSSOC 2026**, your PR **must** link to your assigned issue.
- **How to fix**: Edit your PR description to add \`Closes #123\` (replace \`123\` with your assigned issue number) under the **Related Issue** section.
- *Once linked, our automated systems will synchronize the score level!*`;
            }

            const commentBody = `## 🎨 Welcome to VISUALAIZE Pro, @${creator}! 🚀

Thank you for opening this pull request and helping us build the future of diagram visualization! We are thrilled to have you participating in **GirlScript Summer of Code (GSSOC) 2026**!

${issueStatusMarkdown}

---

### 🏆 GSSOC 2026 PR Labels Cheat-sheet

Use this quick-reference guide to check the scoring and labeling status of your pull request:

| Category | Available Labels | Description |
| :--- | :--- | :--- |
| **Difficulty** <br>*(Required, Pick One)* | \`level:beginner\` (20 pts) <br>\`level:intermediate\` (35 pts) <br>\`level:advanced\` (55 pts) <br>\`level:critical\` (80 pts) | Copied automatically from your linked issue. |
| **Quality** <br>*(Optional Multiplier)* | \`quality:clean\` <br>\`quality:exceptional\` | Mentors can apply these for outstanding, clean contributions. |
| **Type** <br>*(Optional Stackable)* | \`type:bug\`, \`type:feature\`, \`type:docs\`, \`type:testing\`, \`type:security\`, \`type:performance\`, \`type:design\`, \`type:refactor\`, \`type:devops\`, \`type:accessibility\` | Optional tags reflecting the type of files modified. |

### 📊 Score Calculation Formula
\`Score = 50 + (Difficulty Base × Quality Multiplier) + Type Bonus\`

📌 **Crucial Rules for Merging:**
- ⭐️ **\`gssoc:approved\`** gives **+50 base points** and is **required on every PR** — without it, the contribution will not count.
- 🧑‍🏫 Mentors must add **\`mentor:username\`** to PRs they reviewed to receive attribution points.
- 🔄 Project data, PR contributions, and leaderboards refresh once daily at **3:30–4:30 AM IST**. Allow 24–48 hours after merge for points to appear.

*Keep up the excellent work, and happy coding!* 💻✨

<!-- gssoc-pr-helper-signature -->`;

            // --- STEP 4: PREVENT SPAM (UPSERT COMMENT) ---
            try {
              const commentsResponse = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });

              const botComment = commentsResponse.data.find(c => c.body.includes('<!-- gssoc-pr-helper-signature -->'));

              if (botComment) {
                console.log("Updating existing welcome comment.");
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: commentBody
                });
              } else {
                console.log("Posting new welcome comment.");
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: commentBody
                });
              }
            } catch (err) {
              console.error("Failed to upsert welcome comment:", err.message);
            }
